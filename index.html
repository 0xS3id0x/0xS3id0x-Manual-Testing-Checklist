<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0xS3id0x Vulnerability Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="grid-bg"></div>
  <div id="blob1"></div>
  <div id="blob2"></div>

  <div class="wrap">
    <header>
      <div class="hdr-row">
        <div>
          <div class="logo"><span>[</span> 0xS3id0x Flow and Vulnerability Checklist <span>]</span></div>
          <div class="handle"> Manual Testing Flow and Vulnerability Checklist 2026</div>
        </div>
        <div class="hdr-right">
          <div class="live">LIVE HUNTING</div>
          <div class="subtitle">BUGS AND FLOWS CHECKLIST</div>
        </div>
      </div>
    </header>

    <div class="stats" id="stats">
      <div class="stat"><span class="n c" id="s-total">0</span><span>TOTAL CHECKS</span></div>
      <div class="stat"><span class="n g" id="s-done">0</span><span>CHECKED</span></div>
      <div class="stat"><span class="n r" id="s-crit">0</span><span>CRITICAL</span></div>
      <div class="stat"><span class="n o" id="s-high">0</span><span>HIGH</span></div>
      <div class="stat"><span class="n y" id="s-med">0</span><span>MEDIUM</span></div>
      <div class="stat"><span class="n g" id="s-low">0</span><span>LOW</span></div>
      <div class="stat"><span class="n p" id="s-pct">0%</span><span>PROGRESS</span></div>
    </div>

    <div class="toolbar">
      <input class="search" id="search" placeholder="$ grep -R \"vuln\" checklist/" autocomplete="off" spellcheck="false">
      <button class="fbtn active" data-f="all">ALL</button>
      <button class="fbtn" data-f="critical">CRITICAL</button>
      <button class="fbtn" data-f="high">HIGH</button>
      <button class="fbtn" data-f="medium">MEDIUM</button>
      <button class="fbtn" data-f="low">LOW</button>
      <button class="fbtn" data-f="done">DONE</button>
      <button class="fbtn" data-f="undone">TODO</button>
      <button class="fbtn" id="reset-btn">RESET ALL</button>
      <div class="progress-wrap">
        <div class="pbar"><div class="pbar-fill" id="main-pbar" style="width:0%"></div></div>
        <span id="pct-txt">0%</span>
      </div>
    </div>

    <div id="content"></div>
    <div id="empty">
      <div class="ico">◈</div>
      <div>NO RESULTS MATCH YOUR FILTER</div>
    </div>

    <div class="copyright">© 2026 0xS3id0x. All rights reserved.</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
